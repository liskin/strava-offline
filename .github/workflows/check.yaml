name: Check

on:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    # Re-test every month
    - cron: '0 2 1 * *'

permissions:
  contents: read

env:
  # dependency cooldown to mitigate supply chain attacks
  UV_EXCLUDE_NEWER: '1 week'

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.10'
          - '3.11'
          - '3.12'
          - '3.13'
          - '3.14'

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python ${{ matrix.python-version }}
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          add-problem-matchers: 'false'
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install dependencies
        run: just --color=always venv
      - name: flake8
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: flake8
          run: just --color=always lint-flake8
      - name: mypy
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: mypy
          run: just --color=always lint-mypy
      - name: isort
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: isort
          run: just --color=always lint-isort
      - name: pytest
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: pytest
          # more pytest verbosity to make it easier to understand failures
          run: just --color=always test-pytest -v --log-level=DEBUG
      - name: prysk, readme
        run: just --color=always readme-diff
      - name: smoke-dist
        run: just --color=always smoke-dist

  check-lowest-direct:
    runs-on: ubuntu-latest

    env:
      UV_RESOLUTION: lowest-direct

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          add-problem-matchers: 'false'
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install dependencies
        run: just --color=always venv-lowest-direct
      - name: flake8
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: flake8
          run: just --color=always lint-flake8
      - name: mypy
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: mypy
          run: just --color=always lint-mypy
      - name: isort
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: isort
          run: just --color=always lint-isort
      - name: pytest
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: pytest
          # more pytest verbosity to make it easier to understand failures
          run: just --color=always test-pytest -v --log-level=DEBUG
      - name: prysk, readme
        run: just --color=always readme-diff

  check-distro:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        image:
          - 'debian:unstable'
          - 'debian:testing'
          - 'debian:stable'
          - 'debian:oldstable'
          - 'ubuntu:devel'
          - 'ubuntu:rolling'
          - 'ubuntu:latest'

    container: ${{ matrix.image }}

    steps:
      - name: Install prerequisites via apt
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -ex
          apt update
          apt install -y git
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Workaround for https://github.com/actions/checkout/issues/1169
        run: git config --global --add safe.directory "$PWD"
      - name: Install dependencies via apt
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -ex

          deps=$(sed -n '/^\[tool.gha-check-distro\]/,/^\[/p' pyproject.toml \
            | tr '\n' ' ' \
            | grep -o -P '\sdependencies-apt\s*=\s*\K\[.*?\]' \
            | grep -o -P '".*?"' \
            | tr -d '"')
          apt-cache --generate pkgnames \
            | grep --line-regexp --fixed-strings "$deps" \
            | xargs apt install -y

          echo '# apt-installed python* packages' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          apt list --installed 'python*' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          add-problem-matchers: 'false'
      - name: Install just
        uses: taiki-e/install-action@just
        # ^ TODO: drop in favor of apt once Ubuntu 26.04 and Debian 14 are released
      - name: Install remaining dependencies
        run: |
          set -ex

          just --color=always venv-system-site-packages

          echo '# pip-installed packages' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          uv pip list >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: flake8
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: flake8
          run: just --color=always lint-flake8
      - name: mypy
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: mypy
          run: just --color=always lint-mypy
      - name: isort
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: isort
          run: just --color=always lint-isort
      - name: pytest
        uses: liskin/gh-problem-matcher-wrap@v3
        with:
          linters: pytest
          # more pytest verbosity to make it easier to understand failures
          run: just --color=always test-pytest -v --log-level=DEBUG
      - name: prysk, readme
        run: just --color=always readme-diff

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-slim
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
